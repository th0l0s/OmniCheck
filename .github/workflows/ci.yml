name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check cti tests
      - name: Tests
        run: pytest -q
      - name: Dependency audit
        run: pip-audit || true
      - name: Security lint (bandit)
        run: bandit -q -r cti -ll || true
