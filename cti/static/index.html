<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniCheck Cockpit</title>
<meta name="description" content="API-driven CTI and infrastructure sentinel">
<link rel="icon" type="image/png" href="/icons/logo/icons8-decentralized-network-48.png">
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="/static/css/cockpit.css">
<link rel="stylesheet" href="/static/css/badges.css">
</head>
<body>
  <div class="scan-line"></div>

  <header class="masthead">
    <a class="brand" href="#" id="brand-link" title="OmniCheck Cockpit — overview">
      <div class="brand-icon">
        <img src="/icons/logo/icons8-decentralized-network-48.png" alt="OmniCheck">
      </div>
      <div class="brand-text">Omni<em>Check</em></div>
    </a>
    <div class="mast-center">
      <span id="threat-badge" role="button" tabindex="0" aria-live="polite"
            title="global threat level — click to inspect"></span>
      <span id="sources-ok" class="mast-info"></span>
      <span id="uptime-lbl" class="mast-info" style="display:none"></span>
    </div>
    <div class="mast-right">
      <div id="rootmon-dots" class="rmon-cluster" aria-label="root DNS health"></div>
      <span class="ts-txt" id="ts-lbl">—</span>
      <span class="cd-txt">↻ <b id="countdown">—</b></span>
      <button class="mast-btn" id="refresh-btn" aria-label="sync all sources now">↻ SYNC</button>
    </div>
  </header>

  <div id="cloud-bar" class="cloud-bar" aria-label="Cloud provider status"></div>

  <div class="app-body">
    <nav id="sidebar" aria-label="Source navigation">
      <div id="nav-list"></div>
    </nav>

    <div class="page-area">
      <div id="page-hdr" class="page-hdr" style="display:none">
        <div class="page-breadcrumb" id="page-breadcrumb"></div>
        <div class="page-title-row">
          <h1 class="page-title" id="page-title"></h1>
          <div class="page-actions" id="page-actions"></div>
        </div>
      </div>
      <main class="page-content" id="workspace" role="main">
        <div class="state-msg"><strong>Initializing…</strong>Connecting to sources.</div>
      </main>
    </div>
  </div>

  <footer class="status-footer" id="status-footer" aria-live="polite">
    <span class="foot-label">Status</span>
    <span class="foot-item">connecting…</span>
  </footer>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
