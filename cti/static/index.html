<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniCheck Cockpit</title>
<meta name="description" content="API-driven CTI and infrastructure sentinel">
<link rel="icon" type="image/png" href="/icons/logo/icons8-decentralized-network-48.png">
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="/static/css/cockpit.css">
<link rel="stylesheet" href="/static/css/badges.css">
</head>
<body>
  <header id="topbar">
    <a class="tb-brand" href="#/check" onclick="event.preventDefault();window.navigate('check')"
       title="Go to Check dashboard">
      <img class="tb-logo" src="/icons/logo/icons8-decentralized-network-48.png" alt="">
      <div>
        <div class="tb-name">OmniCheck <em>Cockpit</em></div>
        <div class="tb-sub">CTI &amp; infrastructure sentinel</div>
      </div>
    </a>
    <div class="tb-center">
      <span id="global-led" class="led led-lg led-off" title="Global status"></span>
      <span id="sources-ok" class="tb-stat">—</span>
      <div id="tb-spie" class="tb-spie" aria-label="Essentials control lights"></div>
    </div>
    <div class="tb-right">
      <span id="tb-pubip" class="tb-ts" title="Public IP of this installation"></span>
      <span id="ts-lbl" class="tb-ts">—</span>
      <span id="countdown" class="tb-cd">—</span>
      <button id="refresh-btn" class="tb-btn" aria-label="Sync all sources">↻ SYNC</button>
    </div>
  </header>

  <div id="bgp-bar" style="display:none">
    <span class="bgp-bar-label">BGP IT</span>
    <div id="bgp-bar-inner"></div>
  </div>

  <div class="app-body">
    <aside id="sidebar" aria-label="Navigation">
      <nav id="nav-list"></nav>
    </aside>
    <main id="content" role="main">
      <div class="init-msg">Initializing…</div>
    </main>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
