  #   tier: high

# ─── Operational notes for the worker ─────────────────────────────────────
# 1. Loader: yaml.safe_load → validate against pydantic FeedSpec model.
# 2. State persistence per feed: { etag, last_modified, last_fetch, last_status,
#    last_hash, error_count }. Save in cache.dir as <id>.json (atomic rename).
# 3. On 304: bump last_fetch, leave content untouched.
# 4. On 200: parse → diff against last_hash → emit only new entries.
# 5. Negative cache on 4xx/5xx: skip until negative_ttl_min elapses.
# 6. Verified=false entries should be probed once (HEAD) and flipped on success;
#    if HEAD returns non-feed Content-Type, fall back to scrape selector.
